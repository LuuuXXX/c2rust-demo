# Verify the generate-rust-ffi SKILL end-to-end
#
# Purpose: Validate that the workflow described in
#          .github/agents/generate-rust-ffi.md works correctly against the
#          real-world DaveGamble/cJSON project.
#
# The workflow exercises the three main deliverables of the SKILL:
#   1. init + merge produce a structurally correct Rust FFI project
#   2. cargo check passes on the generated project (with iterate-until-pass loop)
#   3. C-side coverage infrastructure is created and a coverage report is emitted
#
# Run locally (after building c2rust-demo):
#   C2RUST_COV=1 target/release/c2rust-demo init -- clang -c cJSON.c -I.
#   target/release/c2rust-demo merge
#   RUSTC_BOOTSTRAP=1 cargo check --manifest-path .c2rust/default/rust/Cargo.toml
#   RUSTC_BOOTSTRAP=1 cargo llvm-cov --manifest-path .c2rust/default/rust/Cargo.toml ...

name: skill-verify

on:
  push:
  pull_request:

jobs:
  verify:
    name: Verify generate-rust-ffi SKILL (cJSON)
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout c2rust-demo
      # ----------------------------------------------------------------
      - name: Checkout c2rust-demo
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. System dependencies
      #    clang is required for LLVM coverage instrumentation.
      #    gcc is required to compile libhook.so.
      # ----------------------------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc clang libclang-dev binutils

      # ----------------------------------------------------------------
      # 3. Rust toolchain with llvm-tools-preview (required by llvm-cov)
      # ----------------------------------------------------------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      # ----------------------------------------------------------------
      # 4. Cache Cargo registry + build artifacts
      # ----------------------------------------------------------------
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-skill-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-skill-

      # ----------------------------------------------------------------
      # 5. Install bindgen-cli (required by c2rust-demo init)
      # ----------------------------------------------------------------
      - name: Install bindgen-cli
        run: cargo install bindgen-cli

      # ----------------------------------------------------------------
      # 6. Install cargo-llvm-cov (required for C-side coverage report)
      # ----------------------------------------------------------------
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      # ----------------------------------------------------------------
      # 7. Build c2rust-demo (release binary)
      # ----------------------------------------------------------------
      - name: Build c2rust-demo
        run: cargo build --release

      # ----------------------------------------------------------------
      # 8. Clone DaveGamble/cJSON (shallow clone for speed)
      # ----------------------------------------------------------------
      - name: Clone cJSON
        run: git clone --depth=1 https://github.com/DaveGamble/cJSON.git /tmp/cjson

      # ----------------------------------------------------------------
      # 9. SKILL Step 1: run c2rust-demo init WITH C2RUST_COV=1
      #
      #    Using clang (not gcc) so that the hook can instrument the C
      #    object files with -fprofile-instr-generate -fcoverage-mapping.
      #    This produces:
      #      .c2rust/default/cov/libcov.a   (instrumented C library)
      #      .c2rust/default/meta/cov_lib.txt
      # ----------------------------------------------------------------
      - name: SKILL Step 1 — c2rust-demo init (with C2RUST_COV=1)
        working-directory: /tmp/cjson
        env:
          C2RUST_COV: "1"
        run: |
          echo "=== SKILL Step 1: c2rust-demo init ==="
          $GITHUB_WORKSPACE/target/release/c2rust-demo init -- clang -c cJSON.c -I.

      # ----------------------------------------------------------------
      # 10. SKILL Step 2: run c2rust-demo merge
      # ----------------------------------------------------------------
      - name: SKILL Step 2 — c2rust-demo merge
        working-directory: /tmp/cjson
        run: |
          echo "=== SKILL Step 2: c2rust-demo merge ==="
          $GITHUB_WORKSPACE/target/release/c2rust-demo merge

      # ----------------------------------------------------------------
      # 11. SKILL Step 3: cargo check — iterate until pass (max 5 rounds)
      #
      #     The loop mirrors the iterate-fix-repeat loop described in the
      #     SKILL.  After init+merge the generated code should already
      #     pass; the loop is here to document and exercise the pattern.
      # ----------------------------------------------------------------
      - name: SKILL Step 3 — cargo check (iterate until pass)
        env:
          RUSTC_BOOTSTRAP: "1"
        run: |
          MANIFEST=/tmp/cjson/.c2rust/default/rust/Cargo.toml
          MAX_ROUNDS=5
          round=0
          while [ $round -lt $MAX_ROUNDS ]; do
            round=$((round + 1))
            echo ""
            echo "=== cargo check — round $round / $MAX_ROUNDS ==="
            if cargo check --manifest-path "$MANIFEST" 2>&1 | tee /tmp/check-round-${round}.log; then
              echo ""
              echo "  [PASS] cargo check passed on round $round"
              exit 0
            fi

            echo ""
            echo "  cargo check failed on round $round — inspecting errors"
            # Show a concise summary of unique error codes to aid debugging
            grep -oP 'error\[E\d+\]' /tmp/check-round-${round}.log | sort -u || true

            if [ $round -lt $MAX_ROUNDS ]; then
              echo "  Applying automatic fixes for round $((round + 1))..."
              # Example: suppress any remaining 'unused' warnings via extra allow attrs.
              # Real fixes would parse the error codes and patch the .rs files.
              # For now, verify that the generated code is already clean.
              echo "  (no patch needed — checking again)"
            fi
          done

          echo ""
          echo "  [FAIL] cargo check still fails after $MAX_ROUNDS rounds"
          echo "  Last error log:"
          cat /tmp/check-round-${MAX_ROUNDS}.log
          exit 1

      # ----------------------------------------------------------------
      # 12. Verify C-side coverage infrastructure was created
      #
      #     Confirms that:
      #       - libcov.a was produced by the instrumented build
      #       - cov_lib.txt records its path
      #       - build.rs in the Rust project links libcov.a
      # ----------------------------------------------------------------
      - name: Verify C coverage infrastructure
        working-directory: /tmp/cjson
        run: |
          FEATURE_ROOT=".c2rust/default"
          PASS=0; FAIL=0

          check_exists() {
            if [ -e "$1" ] || [ -L "$1" ]; then
              echo "  [PASS] $2"; PASS=$((PASS+1))
            else
              echo "  [FAIL] $2 -- NOT FOUND: $1"; FAIL=$((FAIL+1))
            fi
          }

          check_contains() {
            if [ -f "$1" ] && grep -qF "$2" "$1"; then
              echo "  [PASS] $3"; PASS=$((PASS+1))
            else
              echo "  [FAIL] $3 -- '$2' not in $1"; FAIL=$((FAIL+1))
            fi
          }

          echo "=== Verifying C coverage infrastructure ==="
          check_exists "$FEATURE_ROOT/cov/libcov.a"       "libcov.a (instrumented C objects)"
          check_exists "$FEATURE_ROOT/meta/cov_lib.txt"   "meta/cov_lib.txt (coverage lib path)"
          check_exists "$FEATURE_ROOT/rust/build.rs"      "rust/build.rs (auto-generated linker script)"
          check_contains "$FEATURE_ROOT/rust/build.rs" \
            "rustc-link-lib=static=cov"                   "build.rs links libcov (rustc-link-lib)"

          echo ""
          echo "Coverage infrastructure: $PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ] || exit 1

      # ----------------------------------------------------------------
      # 13. SKILL Step 4: add a minimal integration test and run
      #     cargo llvm-cov to produce a C-side coverage report.
      #
      #     The test simply links the binary — even calling no C functions
      #     demonstrates that the instrumented libcov.a links correctly
      #     and that cargo llvm-cov can produce a report.  Real projects
      #     should write tests that actually invoke the C API.
      # ----------------------------------------------------------------
      - name: SKILL Step 4 — add integration test to generated Rust project
        working-directory: /tmp/cjson/.c2rust/default/rust
        run: |
          mkdir -p tests

          cat > tests/ffi_smoke.rs << 'EOF'
          // Minimal smoke test that links the coverage-instrumented C library.
          // A real project would call C functions here to generate meaningful
          // C-side coverage data.
          #[test]
          fn link_succeeds() {
              // If this test compiles and links, libcov.a was linked correctly.
              let _ = 42_u64.wrapping_add(1);
          }
          EOF

          # Register the test binary in Cargo.toml
          cat >> Cargo.toml << 'EOF'

          [[test]]
          name = "ffi_smoke"
          path = "tests/ffi_smoke.rs"
          EOF

          echo "Integration test written to tests/ffi_smoke.rs"
          echo "Cargo.toml updated with [[test]] entry"

      - name: SKILL Step 4 — cargo llvm-cov (C-side coverage report)
        env:
          RUSTC_BOOTSTRAP: "1"
        run: |
          echo "=== SKILL Step 4: C-side coverage report ==="
          cargo llvm-cov \
            --manifest-path /tmp/cjson/.c2rust/default/rust/Cargo.toml \
            --summary-only \
            2>&1 | tee /tmp/coverage-summary.txt

          echo ""
          echo "Coverage summary written to /tmp/coverage-summary.txt"

          # Verify the report contains a coverage table (Filename/Lines/Functions headers)
          if ! grep -qi "Filename\|Lines\|Functions" /tmp/coverage-summary.txt; then
            echo "  [FAIL] cargo llvm-cov did not produce a coverage table"
            cat /tmp/coverage-summary.txt
            exit 1
          fi
          # Check separately for fatal errors that indicate a broken run
          if grep -qi "panicked at\|fatal error" /tmp/coverage-summary.txt; then
            echo "  [FAIL] cargo llvm-cov reported a fatal error"
            cat /tmp/coverage-summary.txt
            exit 1
          fi
          echo "  [PASS] C-side coverage report generated"

      # ----------------------------------------------------------------
      # 14. Generate lcov report artifact (for download / external tools)
      # ----------------------------------------------------------------
      - name: Generate lcov coverage report
        env:
          RUSTC_BOOTSTRAP: "1"
        run: |
          cargo llvm-cov \
            --manifest-path /tmp/cjson/.c2rust/default/rust/Cargo.toml \
            --lcov --output-path /tmp/c-coverage.lcov
          lcov_lines=$(wc -l < /tmp/c-coverage.lcov 2>/dev/null || echo 0)
          echo "lcov report: $lcov_lines lines written to /tmp/c-coverage.lcov"
          if [ "$lcov_lines" -eq 0 ]; then
            echo "  [WARN] lcov report is empty"
          else
            echo "  [PASS] lcov report generated successfully"
          fi

      # ----------------------------------------------------------------
      # 15. Show generated output tree (always, for debugging)
      # ----------------------------------------------------------------
      - name: Show generated output tree
        if: always()
        working-directory: /tmp/cjson
        run: |
          echo "=== Generated .c2rust directory tree ==="
          find .c2rust -type f | sort || echo "(no .c2rust output)"
          echo ""
          echo "=== rust/build.rs ==="
          cat .c2rust/default/rust/build.rs 2>/dev/null || echo "(not generated)"
          echo ""
          echo "=== meta/cov_lib.txt ==="
          cat .c2rust/default/meta/cov_lib.txt 2>/dev/null || echo "(not present)"
          echo ""
          echo "=== Coverage summary ==="
          cat /tmp/coverage-summary.txt 2>/dev/null || echo "(not generated)"

      # ----------------------------------------------------------------
      # 16. Upload artifacts
      # ----------------------------------------------------------------
      - name: Upload .c2rust artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-verify-c2rust-output
          path: /tmp/cjson/.c2rust/
          if-no-files-found: warn

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-verify-coverage
          path: /tmp/c-coverage.lcov
          if-no-files-found: warn
